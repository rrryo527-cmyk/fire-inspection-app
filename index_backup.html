<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>消防設備点検チェックリスト - 株式会社TMS</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  background: linear-gradient(135deg, #0d1f3c 0%, #1A3557 40%, #243b5e 100%);
  color: #e8ecf1;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== Glassmorphism Cards ===== */
.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
}
.glass-strong {
  background: rgba(255,255,255,0.14);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 16px;
}

/* ===== Layout ===== */
.app-container { max-width: 640px; margin: 0 auto; padding: 12px; padding-bottom: 100px; }
.header {
  text-align: center;
  padding: 20px 16px 16px;
  margin-bottom: 16px;
}
.header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.02em; }
.header .subtitle { font-size: 0.75rem; opacity: 0.6; margin-top: 4px; }

/* ===== Navigation Breadcrumb ===== */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.78rem;
  opacity: 0.7;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.breadcrumb span { cursor: pointer; }
.breadcrumb span:hover { opacity: 1; text-decoration: underline; }
.breadcrumb .sep { opacity: 0.4; cursor: default; }
.breadcrumb .sep:hover { text-decoration: none; }

/* ===== Category Filter Chips ===== */
.chip-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 4px 0 12px;
  scrollbar-width: none;
}
.chip-row::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  white-space: nowrap;
}
.chip.active {
  background: rgba(255,255,255,0.22);
  border-color: rgba(255,255,255,0.35);
  box-shadow: 0 0 12px rgba(255,255,255,0.1);
}

/* ===== Equipment List Cards ===== */
.equip-card {
  padding: 16px 18px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.equip-card:hover { background: rgba(255,255,255,0.14); transform: translateY(-1px); }
.equip-card:active { transform: scale(0.98); }
.equip-card .eq-title { font-size: 1rem; font-weight: 600; }
.equip-card .eq-sub { font-size: 0.75rem; opacity: 0.55; margin-top: 3px; }
.equip-card .eq-badge {
  display: inline-block;
  font-size: 0.68rem;
  padding: 2px 8px;
  border-radius: 8px;
  background: rgba(255,255,255,0.1);
  margin-top: 6px;
}

/* ===== Inspection Type Toggle ===== */
.toggle-bar {
  display: flex;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 14px;
  border: 1px solid rgba(255,255,255,0.15);
}
.toggle-btn {
  flex: 1;
  padding: 12px;
  text-align: center;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  background: rgba(255,255,255,0.04);
}
.toggle-btn.active {
  background: rgba(255,255,255,0.2);
}

/* ===== Warning / Caution Boxes ===== */
.caution-box {
  background: rgba(204,34,34,0.15);
  border: 1px solid rgba(204,34,34,0.4);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 14px;
}
.caution-box .caution-title {
  color: #ff6b6b;
  font-weight: 700;
  font-size: 0.92rem;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.caution-box ul { padding-left: 18px; font-size: 0.82rem; line-height: 1.7; }
.caution-box li { margin-bottom: 4px; }

.info-box {
  background: rgba(52,152,219,0.12);
  border: 1px solid rgba(52,152,219,0.3);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 14px;
}
.info-box .info-title {
  color: #5dade2;
  font-weight: 700;
  font-size: 0.92rem;
  margin-bottom: 8px;
}
.info-box ul { padding-left: 18px; font-size: 0.82rem; line-height: 1.7; }
.info-box li { margin-bottom: 4px; }

/* ===== Checklist Items ===== */
.check-item {
  margin-bottom: 10px;
  padding: 14px 16px;
  transition: all 0.15s;
}
.check-item-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}
.check-item-name {
  font-size: 0.92rem;
  font-weight: 600;
  flex: 1;
}
.check-item-expand {
  font-size: 0.72rem;
  opacity: 0.5;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  background: rgba(255,255,255,0.06);
  white-space: nowrap;
  transition: all 0.2s;
  flex-shrink: 0;
}
.check-item-expand:hover { background: rgba(255,255,255,0.12); opacity: 0.8; }

.criteria-panel {
  display: none;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  font-size: 0.8rem;
  line-height: 1.6;
}
.criteria-panel.open { display: block; }
.criteria-label { font-weight: 600; color: #5dade2; margin-bottom: 2px; }
.criteria-text { opacity: 0.85; margin-bottom: 8px; }
.criteria-text:last-child { margin-bottom: 0; }

/* ===== Result Buttons ===== */
.result-btns {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}
.result-btn {
  flex: 1;
  padding: 10px 6px;
  border-radius: 10px;
  text-align: center;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  border: 2px solid transparent;
  background: rgba(255,255,255,0.06);
}
.result-btn:active { transform: scale(0.95); }
.result-btn.good { border-color: rgba(39,174,96,0.3); }
.result-btn.good.selected { background: rgba(39,174,96,0.35); border-color: #27ae60; color: #fff; }
.result-btn.bad { border-color: rgba(204,34,34,0.3); }
.result-btn.bad.selected { background: rgba(204,34,34,0.35); border-color: #CC2222; color: #fff; }
.result-btn.na { border-color: rgba(255,255,255,0.15); }
.result-btn.na.selected { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.4); }

/* ===== Memo Field ===== */
.memo-field {
  display: none;
  margin-top: 8px;
}
.memo-field.open { display: block; }
.memo-field textarea {
  width: 100%;
  min-height: 60px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  color: #e8ecf1;
  padding: 10px 12px;
  font-size: 0.82rem;
  font-family: inherit;
  resize: vertical;
}
.memo-field textarea::placeholder { color: rgba(255,255,255,0.3); }

/* ===== Progress Bar ===== */
.progress-bar-container {
  margin-bottom: 14px;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.78rem;
  opacity: 0.7;
  margin-bottom: 6px;
}
.progress-track {
  height: 6px;
  border-radius: 3px;
  background: rgba(255,255,255,0.1);
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, #27ae60, #2ecc71);
  transition: width 0.3s;
}

/* ===== Summary Screen ===== */
.summary-section { margin-bottom: 16px; }
.summary-section h3 {
  font-size: 0.92rem;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.summary-input-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
}
.summary-input-group label {
  font-size: 0.8rem;
  opacity: 0.7;
}
.summary-input-group input {
  width: 100%;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  color: #e8ecf1;
  font-size: 0.88rem;
  font-family: inherit;
}
.summary-input-group input::placeholder { color: rgba(255,255,255,0.3); }

.summary-stat-row {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
}
.summary-stat {
  flex: 1;
  text-align: center;
  padding: 14px 8px;
  border-radius: 12px;
}
.summary-stat .stat-num { font-size: 1.6rem; font-weight: 700; }
.summary-stat .stat-label { font-size: 0.72rem; opacity: 0.7; margin-top: 2px; }
.stat-good { background: rgba(39,174,96,0.15); border: 1px solid rgba(39,174,96,0.3); }
.stat-good .stat-num { color: #2ecc71; }
.stat-bad { background: rgba(204,34,34,0.15); border: 1px solid rgba(204,34,34,0.3); }
.stat-bad .stat-num { color: #ff6b6b; }
.stat-na { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); }

.defect-item {
  padding: 12px 14px;
  margin-bottom: 8px;
  border-left: 3px solid #CC2222;
}
.defect-item .defect-name { font-weight: 600; font-size: 0.88rem; color: #ff6b6b; }
.defect-item .defect-memo { font-size: 0.8rem; opacity: 0.7; margin-top: 4px; }

/* ===== Action Buttons ===== */
.action-btn {
  display: block;
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  text-align: center;
  font-size: 0.92rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  margin-bottom: 10px;
}
.action-btn:active { transform: scale(0.97); }
.btn-primary {
  background: linear-gradient(135deg, #27ae60, #2ecc71);
  color: #fff;
}
.btn-secondary {
  background: rgba(255,255,255,0.1);
  color: #e8ecf1;
  border: 1px solid rgba(255,255,255,0.2);
}
.btn-danger {
  background: rgba(204,34,34,0.2);
  color: #ff6b6b;
  border: 1px solid rgba(204,34,34,0.3);
}
.btn-export {
  background: linear-gradient(135deg, #2980b9, #3498db);
  color: #fff;
}

/* ===== Back Button ===== */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.82rem;
  cursor: pointer;
  opacity: 0.7;
  margin-bottom: 14px;
  padding: 6px 12px;
  border-radius: 8px;
  background: rgba(255,255,255,0.06);
  transition: all 0.2s;
}
.back-btn:hover { opacity: 1; background: rgba(255,255,255,0.1); }

/* ===== Animations ===== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.25s ease-out; }

/* ===== Print ===== */
@media print {
  body { background: #fff; color: #000; }
  .glass, .glass-strong { background: #fff; border: 1px solid #ccc; backdrop-filter: none; }
}

/* ===== Acknowledgment Overlay ===== */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.overlay.open { display: flex; }
.overlay-card {
  max-width: 560px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 24px 20px;
}
.overlay-card h2 {
  font-size: 1.1rem;
  margin-bottom: 14px;
  text-align: center;
}

/* ===== Floating Bottom Bar ===== */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 12px;
  background: rgba(13,31,60,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid rgba(255,255,255,0.08);
  z-index: 500;
}
.bottom-bar-inner {
  max-width: 640px;
  margin: 0 auto;
  display: flex;
  gap: 8px;
}
.bottom-bar .action-btn { margin-bottom: 0; flex: 1; }

/* Type=date fix */
input[type="date"] { color-scheme: dark; }
</style>
</head>

// ============================================================
//  APP STATE
// ============================================================
let state = {
  screen: 'home',        // home | caution | inspection | summary
  selectedCategory: 'all',
  selectedEquipId: null,
  inspectionType: '機器点検',
  results: {},            // { equipId: { type: { itemIndex: { status, memo } } } }
  summaryInfo: { date: '', building: '', inspector: '' },
  cautionAcknowledged: false
};

// ============================================================
//  HELPERS
// ============================================================
function getEquip() { return EQUIPMENT_DATA[state.selectedEquipId]; }
function getItems() {
  const eq = getEquip();
  return eq ? eq.inspectionTypes[state.inspectionType] || [] : [];
}
function getResult(idx) {
  const eid = state.selectedEquipId;
  const t = state.inspectionType;
  if (!state.results[eid]) state.results[eid] = {};
  if (!state.results[eid][t]) state.results[eid][t] = {};
  if (!state.results[eid][t][idx]) state.results[eid][t][idx] = { status: null, memo: '' };
  return state.results[eid][t][idx];
}
function setResult(idx, field, value) {
  const r = getResult(idx);
  r[field] = value;
  render();
}
function countByStatus(equipId) {
  const counts = { good: 0, bad: 0, na: 0, total: 0 };
  const eq = EQUIPMENT_DATA[equipId];
  if (!eq || !state.results[equipId]) return counts;
  for (const type of Object.keys(eq.inspectionTypes)) {
    const items = eq.inspectionTypes[type];
    const res = state.results[equipId][type] || {};
    items.forEach((_, i) => {
      counts.total++;
      const r = res[i];
      if (r) {
        if (r.status === 'good') counts.good++;
        else if (r.status === 'bad') counts.bad++;
        else if (r.status === 'na') counts.na++;
      }
    });
  }
  return counts;
}

// ============================================================
//  RENDER ENGINE
// ============================================================
function render() {
  const app = document.getElementById('app');
  switch (state.screen) {
    case 'home': app.innerHTML = renderHome(); break;
    case 'caution': app.innerHTML = renderCaution(); break;
    case 'inspection': app.innerHTML = renderInspection(); break;
    case 'summary': app.innerHTML = renderSummary(); break;
  }
  // Reattach events
  attachEvents();
}

// ----- SUMMARY SCREEN -----
function renderSummary() {
  // Collect all defects
  const defects = [];
  for (const [eid, types] of Object.entries(state.results)) {
    const eq = EQUIPMENT_DATA[eid];
    if (!eq) continue;
    for (const [type, items] of Object.entries(types)) {
      const list = eq.inspectionTypes[type] || [];
      for (const [idx, r] of Object.entries(items)) {
        if (r.status === 'bad') {
          defects.push({
            equip: `${eq.section} ${eq.name}`,
            type,
            name: list[idx] ? list[idx].name : `項目${idx}`,
            memo: r.memo || ''
          });
        }
      }
    }
  }

  // Stats
  let totalGood = 0, totalBad = 0, totalNA = 0, totalAll = 0;
  for (const eid of Object.keys(state.results)) {
    const c = countByStatus(eid);
    totalGood += c.good;
    totalBad += c.bad;
    totalNA += c.na;
    totalAll += c.total;
  }

  return `
    <div class="back-btn" id="btn-back-home">← 設備選択に戻る</div>

    <div class="header" style="padding-top:8px">
      <h1>点検結果サマリー</h1>
    </div>

    <div class="glass-strong summary-section fade-in" style="padding:18px">
      <h3>物件情報</h3>
      <div class="summary-input-group">
        <label>点検日</label>
        <input type="date" id="inp-date" value="${state.summaryInfo.date}">
        <label>物件名</label>
        <input type="text" id="inp-building" placeholder="例：○○マンション" value="${state.summaryInfo.building}">
        <label>点検者名</label>
        <input type="text" id="inp-inspector" placeholder="例：山田太郎" value="${state.summaryInfo.inspector}">
      </div>
    </div>

    <div class="summary-stat-row fade-in">
      <div class="summary-stat stat-good glass">
        <div class="stat-num">${totalGood}</div>
        <div class="stat-label">良</div>
      </div>
      <div class="summary-stat stat-bad glass">
        <div class="stat-num">${totalBad}</div>
        <div class="stat-label">不良</div>
      </div>
      <div class="summary-stat stat-na glass">
        <div class="stat-num">${totalNA}</div>
        <div class="stat-label">対象外</div>
      </div>
    </div>

    ${defects.length > 0 ? `
      <div class="glass-strong summary-section fade-in" style="padding:18px">
        <h3 style="color:#ff6b6b">不良項目一覧（${defects.length}件）</h3>
        ${defects.map(d => `
          <div class="defect-item glass">
            <div class="defect-name">${d.equip} ― ${d.name}</div>
            <div class="defect-memo">${d.type}${d.memo ? ' ｜ ' + d.memo : ''}</div>
          </div>
        `).join('')}
      </div>
    ` : `
      <div class="info-box fade-in">
        <div class="info-title">不良項目なし</div>
        <p style="font-size:0.82rem;opacity:0.7">全ての点検項目が良好または対象外です。</p>
      </div>
    `}

    <div class="glass-strong summary-section fade-in" style="padding:18px">
      <h3>設備別 点検状況</h3>
      ${Object.values(EQUIPMENT_DATA).map(eq => {
        const c = countByStatus(eq.id);
        if (c.good + c.bad + c.na === 0) return '';
        const pct = c.total ? Math.round((c.good + c.bad + c.na) / c.total * 100) : 0;
        return `
          <div style="margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:4px">
              <span>${eq.section} ${eq.name}</span>
              <span style="opacity:0.6">${pct}%完了</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" style="width:${pct}%"></div>
            </div>
            <div style="font-size:0.72rem;opacity:0.5;margin-top:3px">
              良:${c.good} 不良:${c.bad} 対象外:${c.na} / 全${c.total}項目
            </div>
          </div>
        `;
      }).join('')}
    </div>

    <button class="action-btn btn-export fade-in" id="btn-csv">CSV ダウンロード</button>
    <button class="action-btn btn-secondary fade-in" id="btn-copy-text">テキストをコピー</button>
    <button class="action-btn btn-danger fade-in" id="btn-reset">全てリセット</button>
  `;
}

// ============================================================
//  EVENT HANDLERS
// ============================================================
function attachEvents() {
  // Category chips
  document.querySelectorAll('.chip').forEach(el => {
    el.addEventListener('click', () => {
      state.selectedCategory = el.dataset.cat;
      render();
    });
  });

  // Equipment cards
  document.querySelectorAll('.equip-card').forEach(el => {
    el.addEventListener('click', () => {
      state.selectedEquipId = el.dataset.equip;
      const eq = getEquip();
      if (eq.cautionNotes) {
        state.screen = 'caution';
      } else {
        state.screen = 'inspection';
      }
      state.inspectionType = Object.keys(eq.inspectionTypes)[0];
      render();
      window.scrollTo(0, 0);
    });
  });

  // Back buttons
  document.getElementById('btn-back-home')?.addEventListener('click', () => {
    state.screen = 'home';
    render();
    window.scrollTo(0, 0);
  });
  document.getElementById('bc-home')?.addEventListener('click', () => {
    state.screen = 'home';
    render();
    window.scrollTo(0, 0);
  });

  // Caution acknowledge
  document.getElementById('btn-acknowledge')?.addEventListener('click', () => {
    state.screen = 'inspection';
    render();
    window.scrollTo(0, 0);
  });

  // Toggle inspection type
  document.querySelectorAll('.toggle-btn').forEach(el => {
    el.addEventListener('click', () => {
      state.inspectionType = el.dataset.type;
      render();
      window.scrollTo(0, 0);
    });
  });

  // Criteria expand
  document.querySelectorAll('.check-item-expand').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = el.dataset.idx;
      const panel = document.getElementById(`criteria-${idx}`);
      if (panel) {
        panel.classList.toggle('open');
        el.textContent = panel.classList.contains('open') ? '判定基準 ▲' : '判定基準 ▼';
      }
    });
  });

  // Result buttons
  document.querySelectorAll('.result-btn').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      const val = el.dataset.val;
      const current = getResult(idx);
      // Toggle off if same
      if (current.status === val) {
        setResult(idx, 'status', null);
      } else {
        setResult(idx, 'status', val);
      }
    });
  });

  // Memo fields
  document.querySelectorAll('.memo-field textarea').forEach(el => {
    el.addEventListener('input', () => {
      const idx = parseInt(el.dataset.idx);
      const r = getResult(idx);
      r.memo = el.value;
    });
  });

  // View summary from home
  document.getElementById('btn-view-summary')?.addEventListener('click', () => {
    state.screen = 'summary';
    render();
    window.scrollTo(0, 0);
  });

  // To summary from inspection
  document.getElementById('btn-to-summary')?.addEventListener('click', () => {
    state.screen = 'summary';
    render();
    window.scrollTo(0, 0);
  });

  // Summary inputs
  document.getElementById('inp-date')?.addEventListener('change', (e) => {
    state.summaryInfo.date = e.target.value;
  });
  document.getElementById('inp-building')?.addEventListener('input', (e) => {
    state.summaryInfo.building = e.target.value;
  });
  document.getElementById('inp-inspector')?.addEventListener('input', (e) => {
    state.summaryInfo.inspector = e.target.value;
  });

  // CSV download
  document.getElementById('btn-csv')?.addEventListener('click', downloadCSV);

  // Copy text
  document.getElementById('btn-copy-text')?.addEventListener('click', copyText);

  // Reset
  document.getElementById('btn-reset')?.addEventListener('click', () => {
    if (confirm('全ての点検結果をリセットしますか？')) {
      state.results = {};
      state.summaryInfo = { date: '', building: '', inspector: '' };
      state.screen = 'home';
      render();
    }
  });
}

// ============================================================
//  EXPORT FUNCTIONS
// ============================================================
function generateReport() {
  const lines = [];
  lines.push('消防設備点検結果報告');
  lines.push('================================');
  if (state.summaryInfo.date) lines.push(`点検日: ${state.summaryInfo.date}`);
  if (state.summaryInfo.building) lines.push(`物件名: ${state.summaryInfo.building}`);
  if (state.summaryInfo.inspector) lines.push(`点検者: ${state.summaryInfo.inspector}`);
  lines.push('');

  for (const [eid, types] of Object.entries(state.results)) {
    const eq = EQUIPMENT_DATA[eid];
    if (!eq) continue;
    lines.push(`【${eq.section} ${eq.name}】`);
    for (const [type, items] of Object.entries(types)) {
      lines.push(`  ＜${type}＞`);
      const list = eq.inspectionTypes[type] || [];
      for (const [idx, r] of Object.entries(items)) {
        if (r.status) {
          const statusLabel = r.status === 'good' ? '良' : r.status === 'bad' ? '不良' : '対象外';
          const name = list[idx] ? list[idx].name : `項目${parseInt(idx)+1}`;
          let line = `    ${name}: ${statusLabel}`;
          if (r.memo) line += ` (${r.memo})`;
          lines.push(line);
        }
      }
    }
    lines.push('');
  }
  return lines.join('\n');
}

function downloadCSV() {
  const BOM = '\uFEFF';
  const rows = [['設備', '点検種別', '点検項目', '判定', 'メモ']];

  for (const [eid, types] of Object.entries(state.results)) {
    const eq = EQUIPMENT_DATA[eid];
    if (!eq) continue;
    for (const [type, items] of Object.entries(types)) {
      const list = eq.inspectionTypes[type] || [];
      for (const [idx, r] of Object.entries(items)) {
        if (r.status) {
          const statusLabel = r.status === 'good' ? '良' : r.status === 'bad' ? '不良' : '対象外';
          const name = list[idx] ? list[idx].name : `項目${parseInt(idx)+1}`;
          rows.push([
            `${eq.section} ${eq.name}`,
            type,
            name,
            statusLabel,
            r.memo || ''
          ]);
        }
      }
    }
  }

  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([BOM + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const dateStr = state.summaryInfo.date || new Date().toISOString().slice(0,10);
  const bldg = state.summaryInfo.building || '点検結果';
  a.download = `消防設備点検_${bldg}_${dateStr}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function copyText() {
  const text = generateReport();
  navigator.clipboard.writeText(text).then(() => {
    alert('点検結果をクリップボードにコピーしました');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('点検結果をクリップボードにコピーしました');
  });
}

// ============================================================
//  INIT
// ============================================================
render();
</script>
