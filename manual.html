<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>消防設備点検 完全マニュアル - 株式会社TMS</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  background: linear-gradient(135deg, #0d1f3c 0%, #1A3557 40%, #243b5e 100%);
  color: #e0e4ea;
  min-height: 100vh;
  line-height: 1.75;
}

/* ===== Glassmorphism ===== */
.glass {
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 14px;
}
.glass-strong {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 14px;
}

/* ===== Layout ===== */
.app-wrap { display: flex; min-height: 100vh; }

/* ===== Sidebar ===== */
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: 280px; z-index: 900;
  background: rgba(10,20,40,0.95);
  backdrop-filter: blur(20px);
  border-right: 1px solid rgba(255,255,255,0.08);
  overflow-y: auto; overflow-x: hidden;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.15) transparent;
}
.sidebar.open { transform: translateX(0); }
.sidebar-header {
  padding: 18px 16px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; justify-content: space-between; align-items: center;
}
.sidebar-header h2 { font-size: 0.88rem; font-weight: 700; }
.sidebar-close {
  width: 32px; height: 32px; border-radius: 8px;
  background: rgba(255,255,255,0.08); border: none;
  color: #e0e4ea; font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.sidebar-close:hover { background: rgba(255,255,255,0.15); }

.nav-group { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.nav-group-title {
  padding: 6px 16px; font-size: 0.7rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  opacity: 0.45;
}
.nav-item {
  display: block; padding: 8px 16px 8px 24px;
  font-size: 0.8rem; color: rgba(255,255,255,0.7);
  text-decoration: none; cursor: pointer;
  transition: all 0.15s; border-left: 3px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.nav-item.active { border-left-color: #5dade2; color: #5dade2; background: rgba(93,173,226,0.08); }
.nav-sub { padding-left: 36px; font-size: 0.75rem; }

.sidebar-overlay {
  display: none; position: fixed; inset: 0; z-index: 899;
  background: rgba(0,0,0,0.5);
}
.sidebar-overlay.open { display: block; }

/* ===== Main Content ===== */
.main { flex: 1; max-width: 860px; margin: 0 auto; padding: 12px 14px 80px; width: 100%; }

/* ===== Top Bar ===== */
.topbar {
  position: sticky; top: 0; z-index: 800;
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; margin-bottom: 12px;
  background: rgba(13,31,60,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.menu-btn {
  width: 40px; height: 40px; border-radius: 10px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  color: #e0e4ea; font-size: 1.2rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.menu-btn:hover { background: rgba(255,255,255,0.14); }
.search-box {
  flex: 1; position: relative;
}
.search-box input {
  width: 100%; padding: 10px 14px 10px 36px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.06);
  color: #e0e4ea; font-size: 0.88rem;
  font-family: inherit; outline: none;
}
.search-box input::placeholder { color: rgba(255,255,255,0.3); }
.search-box input:focus { border-color: rgba(93,173,226,0.5); background: rgba(255,255,255,0.09); }
.search-icon {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  font-size: 0.9rem; opacity: 0.4; pointer-events: none;
}

/* ===== Title Header ===== */
.page-header {
  text-align: center; padding: 28px 16px 20px;
  margin-bottom: 20px;
}
.page-header h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: 0.03em; margin-bottom: 6px; }
.page-header .subtitle { font-size: 0.75rem; opacity: 0.5; }
.page-header .badge {
  display: inline-block; margin-top: 10px;
  padding: 4px 14px; border-radius: 20px;
  background: rgba(93,173,226,0.15); border: 1px solid rgba(93,173,226,0.3);
  font-size: 0.7rem; color: #5dade2;
}

/* ===== Chapter Headings ===== */
.chapter-title {
  font-size: 1.2rem; font-weight: 800;
  padding: 18px 20px; margin: 24px 0 14px;
  border-left: 4px solid #5dade2;
  background: rgba(93,173,226,0.08);
  border-radius: 0 14px 14px 0;
}
.section-title {
  font-size: 1.05rem; font-weight: 700;
  padding: 14px 18px; margin: 20px 0 12px;
  border-left: 3px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.04);
  border-radius: 0 12px 12px 0;
}
.subsection-title {
  font-size: 0.92rem; font-weight: 700;
  margin: 16px 0 8px; padding-bottom: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* ===== Content Cards ===== */
.card {
  padding: 18px 20px; margin-bottom: 12px;
}
.card p { margin-bottom: 10px; font-size: 0.88rem; }
.card p:last-child { margin-bottom: 0; }

/* ===== Warning / Info Boxes ===== */
.caution-box {
  background: rgba(204,34,34,0.12);
  border: 1px solid rgba(204,34,34,0.35);
  border-radius: 14px; padding: 16px 18px; margin-bottom: 12px;
}
.caution-box .caution-title {
  color: #ff6b6b; font-weight: 700; font-size: 0.88rem;
  margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.info-box {
  background: rgba(52,152,219,0.10);
  border: 1px solid rgba(52,152,219,0.25);
  border-radius: 14px; padding: 16px 18px; margin-bottom: 12px;
}
.info-box .info-title {
  color: #5dade2; font-weight: 700; font-size: 0.88rem; margin-bottom: 8px;
}
.note-box {
  background: rgba(241,196,15,0.08);
  border: 1px solid rgba(241,196,15,0.25);
  border-radius: 14px; padding: 16px 18px; margin-bottom: 12px;
}
.note-box .note-title {
  color: #f1c40f; font-weight: 700; font-size: 0.88rem; margin-bottom: 8px;
}

.box-list { padding-left: 18px; font-size: 0.82rem; line-height: 1.8; }
.box-list li { margin-bottom: 4px; }

/* ===== Tables ===== */
.table-wrap {
  overflow-x: auto; margin-bottom: 12px;
  border-radius: 12px; border: 1px solid rgba(255,255,255,0.08);
  -webkit-overflow-scrolling: touch;
}
.tbl {
  width: 100%; border-collapse: collapse;
  font-size: 0.8rem; white-space: nowrap;
}
.tbl th {
  padding: 10px 14px; text-align: left;
  background: rgba(93,173,226,0.12);
  border-bottom: 1px solid rgba(255,255,255,0.12);
  font-weight: 700; font-size: 0.75rem;
  color: #5dade2; position: sticky; top: 0;
}
.tbl td {
  padding: 9px 14px; border-bottom: 1px solid rgba(255,255,255,0.05);
  white-space: normal; min-width: 120px;
}
.tbl tr:hover td { background: rgba(255,255,255,0.03); }
.tbl tr:last-child td { border-bottom: none; }
.tbl .col-narrow { min-width: 80px; max-width: 140px; }
.tbl .col-wide { min-width: 200px; }
.tbl .highlight { color: #ff6b6b; font-weight: 600; }

/* ===== Ordered / Unordered Lists ===== */
.content-list { padding-left: 20px; margin-bottom: 12px; }
.content-list li { margin-bottom: 6px; font-size: 0.85rem; }

/* ===== Collapsible ===== */
.collapsible { margin-bottom: 12px; }
.collapsible-header {
  padding: 14px 18px; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
  font-weight: 600; font-size: 0.9rem;
  user-select: none;
}
.collapsible-header:hover { background: rgba(255,255,255,0.04); border-radius: 14px; }
.collapsible-arrow { font-size: 0.7rem; opacity: 0.5; transition: transform 0.2s; }
.collapsible.open .collapsible-arrow { transform: rotate(90deg); }
.collapsible-body {
  display: none; padding: 0 18px 16px;
}
.collapsible.open .collapsible-body { display: block; }

/* ===== Search Highlights ===== */
mark {
  background: rgba(241,196,15,0.35); color: inherit;
  border-radius: 2px; padding: 0 2px;
}

/* ===== Search Results Panel ===== */
.search-results {
  display: none; margin-bottom: 16px;
}
.search-results.open { display: block; }
.search-result-item {
  padding: 12px 16px; margin-bottom: 6px; cursor: pointer;
  transition: all 0.15s;
}
.search-result-item:hover { background: rgba(255,255,255,0.12); }
.search-result-item .sr-title { font-weight: 600; font-size: 0.88rem; color: #5dade2; }
.search-result-item .sr-context { font-size: 0.78rem; opacity: 0.6; margin-top: 3px; }
.search-count { font-size: 0.78rem; opacity: 0.5; margin-bottom: 8px; }

/* ===== Back to Top ===== */
.back-top {
  position: fixed; bottom: 20px; right: 20px;
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(93,173,226,0.3); border: 1px solid rgba(93,173,226,0.5);
  color: #fff; font-size: 1.1rem; cursor: pointer;
  display: none; align-items: center; justify-content: center;
  z-index: 700; transition: all 0.2s;
  backdrop-filter: blur(8px);
}
.back-top.visible { display: flex; }
.back-top:hover { background: rgba(93,173,226,0.5); }

/* ===== Animations ===== */
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.2s ease-out; }

/* ===== Print ===== */
@media print {
  body { background: #fff; color: #000; }
  .glass, .glass-strong { background: #fff; border: 1px solid #ccc; backdrop-filter: none; }
  .sidebar, .topbar, .back-top { display: none !important; }
  .main { max-width: 100%; padding: 0; }
  .tbl th { background: #eee; color: #333; }
}

/* ===== Desktop ===== */
@media (min-width: 1024px) {
  .sidebar { transform: translateX(0); }
  .sidebar-overlay { display: none !important; }
  .main { margin-left: 280px; padding: 16px 28px 80px; }
  .sidebar-close { display: none; }
  .menu-btn { display: none; }
}
</style>
</head>
<body>

<!-- Sidebar Overlay -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- Sidebar Navigation -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>目次</h2>
    <button class="sidebar-close" id="sidebarClose">&times;</button>
  </div>
  <div id="sidebarNav"></div>
</nav>

<!-- Main Content -->
<div class="main">
  <!-- Top Bar -->
  <div class="topbar">
    <button class="menu-btn" id="menuBtn">☰</button>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="キーワードで検索...">
    </div>
  </div>

  <!-- Search Results -->
  <div class="search-results" id="searchResults"></div>

  <!-- Content Container -->
  <div id="content"></div>
</div>

<!-- Back to Top -->
<button class="back-top" id="backTop">↑</button>

<script>
// ============================================================
//  MANUAL DATA
// ============================================================
const MANUAL = {};

// Will be populated by buildManual()

// ============================================================
//  SIDEBAR NAVIGATION DATA
// ============================================================
const NAV_STRUCTURE = [
  { group: '制度概要', items: [
    { id: 'ch1', label: '第1章 制度の概要' },
    { id: 's1-1', label: '1-1 法的根拠と点検種別', sub: true },
    { id: 's1-2', label: '1-2 対象建物と報告頻度', sub: true },
    { id: 's1-3', label: '1-3 機器点検と総合点検の違い', sub: true },
    { id: 's1-4', label: '1-4 点検資格と報告義務', sub: true },
  ]},
  { group: '消火設備', items: [
    { id: 'ch2', label: '第2章 消火設備' },
    { id: 's2-1', label: '2-1 消火器具', sub: true },
    { id: 's2-2', label: '2-2 屋内消火栓設備', sub: true },
    { id: 's2-3', label: '2-3 屋外消火栓設備', sub: true },
    { id: 's2-4', label: '2-4 スプリンクラー設備', sub: true },
    { id: 's2-5', label: '2-5 水噴霧消火設備', sub: true },
    { id: 's2-6', label: '2-6 泡消火設備', sub: true },
    { id: 's2-7', label: '2-7 不活性ガス消火設備', sub: true },
    { id: 's2-8', label: '2-8 ハロゲン化物消火設備', sub: true },
    { id: 's2-9', label: '2-9 粉末消火設備', sub: true },
    { id: 's2-10', label: '2-10 パッケージ型消火設備', sub: true },
  ]},
  { group: '警報設備', items: [
    { id: 'ch3', label: '第3章 警報設備' },
    { id: 's3-1', label: '3-1 自動火災報知設備', sub: true },
    { id: 's3-2', label: '3-2 非常警報設備', sub: true },
    { id: 's3-3', label: '3-3 ガス漏れ・漏電火災警報', sub: true },
    { id: 's3-4', label: '3-4 火災通報装置', sub: true },
  ]},
  { group: '避難設備', items: [
    { id: 'ch4', label: '第4章 避難設備' },
    { id: 's4-1', label: '4-1 誘導灯・誘導標識', sub: true },
    { id: 's4-2', label: '4-2 避難器具', sub: true },
  ]},
  { group: '消防用水・施設', items: [
    { id: 'ch5', label: '第5章 消防用水・施設' },
    { id: 's5-1', label: '5-1 連結送水管', sub: true },
    { id: 's5-2', label: '5-2 消防用水', sub: true },
    { id: 's5-3', label: '5-3 排煙設備', sub: true },
    { id: 's5-4', label: '5-4 動力消防ポンプ設備', sub: true },
    { id: 's5-5', label: '5-5 非常電源', sub: true },
    { id: 's5-6', label: '5-6 連結散水・非常コンセント', sub: true },
    { id: 's5-7', label: '5-7 無線通信補助設備', sub: true },
    { id: 's5-8', label: '5-8 配線・総合操作盤', sub: true },
  ]},
  { group: '実務・基準', items: [
    { id: 'ch6', label: '第6章 点検フロー・報告書' },
    { id: 'ch7', label: '第7章 よくある不具合と是正' },
    { id: 'ch8', label: '第8章 東京消防庁基準・特例' },
  ]},
];

// ============================================================
//  RENDER SIDEBAR
// ============================================================
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = NAV_STRUCTURE.map(g => `
    <div class="nav-group">
      <div class="nav-group-title">${g.group}</div>
      ${g.items.map(item => `
        <a class="nav-item${item.sub ? ' nav-sub' : ''}" data-target="${item.id}">${item.label}</a>
      `).join('')}
    </div>
  `).join('');

  nav.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => {
      const target = document.getElementById(el.dataset.target);
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        closeSidebar();
      }
    });
  });
}

// ============================================================
//  SIDEBAR TOGGLE
// ============================================================
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

// ============================================================
//  SEARCH
// ============================================================
function initSearch() {
  const input = document.getElementById('searchInput');
  let timer;
  input.addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(() => doSearch(input.value.trim()), 300);
  });
}

function doSearch(query) {
  const panel = document.getElementById('searchResults');
  const content = document.getElementById('content');

  // Remove old highlights
  content.querySelectorAll('mark').forEach(m => {
    m.replaceWith(m.textContent);
  });

  if (!query || query.length < 2) {
    panel.classList.remove('open');
    panel.innerHTML = '';
    return;
  }

  const sections = content.querySelectorAll('[id]');
  const results = [];
  const regex = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');

  sections.forEach(sec => {
    const text = sec.textContent;
    if (regex.test(text)) {
      const heading = sec.querySelector('.chapter-title, .section-title, .subsection-title');
      const title = heading ? heading.textContent : sec.id;
      // Get context
      const idx = text.toLowerCase().indexOf(query.toLowerCase());
      const start = Math.max(0, idx - 30);
      const end = Math.min(text.length, idx + query.length + 50);
      const context = (start > 0 ? '...' : '') + text.substring(start, end) + (end < text.length ? '...' : '');
      results.push({ id: sec.id, title, context });
    }
  });

  if (results.length === 0) {
    panel.innerHTML = '<div class="search-count">検索結果なし</div>';
  } else {
    panel.innerHTML = `
      <div class="search-count">${results.length}件の一致</div>
      ${results.map(r => `
        <div class="glass search-result-item" data-target="${r.id}">
          <div class="sr-title">${r.title}</div>
          <div class="sr-context">${r.context}</div>
        </div>
      `).join('')}
    `;
    panel.querySelectorAll('.search-result-item').forEach(el => {
      el.addEventListener('click', () => {
        const target = document.getElementById(el.dataset.target);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });
  }
  panel.classList.add('open');
}

// ============================================================
//  COLLAPSIBLE
// ============================================================
function initCollapsibles() {
  document.querySelectorAll('.collapsible-header').forEach(h => {
    h.addEventListener('click', () => {
      h.parentElement.classList.toggle('open');
    });
  });
}

// ============================================================
//  BACK TO TOP
// ============================================================
function initBackTop() {
  const btn = document.getElementById('backTop');
  window.addEventListener('scroll', () => {
    btn.classList.toggle('visible', window.scrollY > 400);
  });
  btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
}

// ============================================================
//  SCROLL SPY (active nav item)
// ============================================================
function initScrollSpy() {
  const ids = [];
  NAV_STRUCTURE.forEach(g => g.items.forEach(i => ids.push(i.id)));

  let ticking = false;
  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        let activeId = ids[0];
        for (const id of ids) {
          const el = document.getElementById(id);
          if (el && el.getBoundingClientRect().top <= 100) activeId = id;
        }
        document.querySelectorAll('.nav-item').forEach(n => {
          n.classList.toggle('active', n.dataset.target === activeId);
        });
        ticking = false;
      });
      ticking = true;
    }
  });
}

// ============================================================
//  HELPER: Build HTML elements
// ============================================================
function H(tag, attrs, ...children) {
  let html = `<${tag}`;
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (v !== undefined && v !== null) html += ` ${k}="${v}"`;
    }
  }
  html += '>';
  for (const c of children) {
    if (c !== null && c !== undefined) html += c;
  }
  html += `</${tag}>`;
  return html;
}

function table(headers, rows, opts = {}) {
  return `<div class="table-wrap">${H('table', { class: 'tbl' },
    H('thead', null, H('tr', null, ...headers.map(h => H('th', null, h)))),
    H('tbody', null, ...rows.map(row =>
      H('tr', null, ...row.map((cell, i) =>
        H('td', { class: opts.highlight && opts.highlight.includes(i) ? 'highlight' : null }, cell)
      ))
    ))
  )}</div>`;
}

function cautionBox(title, items) {
  return `<div class="caution-box">
    <div class="caution-title">⚠ ${title}</div>
    <ol class="box-list">${items.map(i => `<li>${i}</li>`).join('')}</ol>
  </div>`;
}

function infoBox(title, items) {
  return `<div class="info-box">
    <div class="info-title">${title}</div>
    ${Array.isArray(items) ? `<ul class="box-list">${items.map(i => `<li>${i}</li>`).join('')}</ul>` : `<p style="font-size:0.82rem">${items}</p>`}
  </div>`;
}

function noteBox(title, content) {
  return `<div class="note-box">
    <div class="note-title">${title}</div>
